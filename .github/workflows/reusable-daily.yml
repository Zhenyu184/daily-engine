name: Reusable Daily Task

on:
  workflow_call:
    # 這裡可以設計 inputs 讓其他專案傳入客製化參數
    # inputs:
    #   slack_webhook:
    #     type: string
    #     required: false

jobs:
  run-core-logic:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout caller repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run daily-engine logic via npx
        # 透過 npx --yes 從 Github 直接下載並執行我們寫好的 script
        # 這樣就不用發布到 NPM registry 也能共用程式碼了！
        run: npx --yes github:Zhenyu184/daily-engine
